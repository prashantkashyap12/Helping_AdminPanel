    <!-- loader -->
    <div *ngIf="loader" class="w-screen h-screen flex-center bg-white dark:bg-dark-card fixed inset-0 z-[9999]">
        <img src="assets/pre-loader/bar-loader.gif" alt="loader">
    </div>
    <!-- loader -->
    
     <!-- Start Main Content -->
    <div class="main-content m-4">
        <div class="grid grid-cols-12 gap-y-7 sm:gap-7 card px-4 sm:px-10 2xl:px-[70px] py-15 lg:items-center lg:min-h-[calc(100vh_-_32px)]">
            <div class="col-span-full lg:col-span-6">
                <div class="flex flex-col items-center justify-center gap-10 text-center">
                    <div class="hidden sm:block">
                        <img src="../../../assets/images/loti/auth-img.png " alt="loti" class="group-[.light]:hidden">
                    </div>
                </div>
            </div>
            <!-- Start Form Area -->
            <div class="col-span-full lg:col-span-6 w-full lg:max-w-[600px]">
                <div class="border border-form dark:border-dark-border p-5 md:p-10 rounded-20 md:rounded-30 dk-theme-card-square">
                    <h2 class="text-xl md:text-[28px] leading-none font-semibold text-heading">
                        Sign In
                    </h2>
                    <p class="font-medium text-gray-500 dark:text-dark-text mt-4">
                        Welcome Back! Log in to your "Helping Hand Account"  
                    </p>
                    <form [formGroup]="signupForm" *ngIf="signupForm" class="leading-none mt-8">
                        <div class="mb-2.5">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" id="email" formControlName="email" placeholder="Enter Registered E-mail" required class="form-input px-4 py-3.5 rounded-lg">
                        </div>
                        <button (click)="onSubmit()" class="btn b-solid btn-primary-solid w-full dk-theme-card-square">Login via OTP</button>
                    </form>
                    <div class="font-spline_sans text-gray-900 dark:text-dark-text leading-none text-center my-4">OR</div>
                    <div class="text-gray-900 dark:text-dark-text font-medium leading-none mt-5">
                        Don’t have an account?
                        <a (click)="signup()" class="text-primary-500 font-semibold">Sign Up</a>
                    </div>
                </div>
            </div>
            <!-- End Form Area -->
        </div>
    </div>
    <!-- End Main Content -->
